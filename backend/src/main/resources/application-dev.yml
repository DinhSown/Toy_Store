spring:
  datasource:
    url: jdbc:mysql://localhost:3306/toy_store?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: toystore
    password: toystore123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway quản lý schema, Hibernate chỉ validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

# App custom properties
app:
  jwt:
    secret: myVerySecretKeyForToyStoreJWTTokenGeneration2026MustBe256BitsLongAtLeast
    expiration-ms: 86400000          # 24 giờ
    refresh-expiration-ms: 604800000  # 7 ngày

  cloudinary:
    cloud-name: your-cloud-name
    api-key: your-api-key
    api-secret: your-api-secret

  cors:
    allowed-origins: http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

logging:
  level:
    com.toystore: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
